<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Seller Pro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111111, #ff7a00);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      padding: 35px 30px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
    }

    .login-container h1 {
      text-align: center;
      color: #111111;
      margin-bottom: 8px;
      font-size: 28px;
    }

    .login-container p {
      text-align: center;
      color: #666666;
      margin-bottom: 28px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 7px;
      color: #222222;
      font-weight: bold;
      font-size: 14px;
    }

    .input-group input {
      width: 100%;
      padding: 13px;
      border: 1px solid #cccccc;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #ff7a00;
      box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #ff7a00;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #e86e00;
      transform: translateY(-1px);
    }

    .erro {
      display: none;
      margin-top: 15px;
      padding: 12px;
      background: #ffe5e5;
      color: #b00020;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
    }

    .rodape {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #888888;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h1>Login</h1>
    <p>Acesse sua área restrita</p>

    <form onsubmit="fazerLogin(event)">
      <div class="input-group">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" required>
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
      </div>

      <button type="submit">Entrar</button>

      <div class="erro" id="mensagemErro">
        Usuário ou senha incorretos.
      </div>
    </form>

    <div class="rodape">
      Seller Pro © Área de acesso
    </div>
  </div>

  <script>
    function fazerLogin(event) {
      event.preventDefault();

      const usuario = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const mensagemErro = document.getElementById("mensagemErro");

      if (usuario.toLowerCase() === "suporte" && senha === "suporte99@") {
        window.location.href = "menu.html";
      } 
      else if (usuario.toUpperCase() === "MENTORIA" && senha === "99@mentoria") {
        window.location.href = "menu_mentoria.html";
      } 
      else {
        mensagemErro.style.display = "block";
      }
    }
  </script>

</body>
</html>
